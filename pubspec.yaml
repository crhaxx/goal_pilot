name: goal_pilot
description: Smart goal-tracking with AI-powered decomposition and coaching.
publish_to: "none"
version: 0.1.1+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # AI
  google_generative_ai: ^0.4.6

  # Environment & config
  flutter_dotenv: ^5.2.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  json_annotation: ^4.9.0
  go_router: ^14.8.1

  # Notifications & sharing
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^4.1.0
  timezone: ^0.10.0
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  home_widget: ^0.9.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F172A"
  image: assets/images/logo.png
  android_12:
    color: "#0F172A"
    image: assets/images/logo.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/logo.png
